server {
    listen 80;
    # The oracle puts a unique id in the downstream PATH (/echo/{id}); answer
    # 200 for any of them so HttpURLConnection reads a normal body.
    location / {
        default_type text/plain;
        return 200 "ok\n";
    }
}

server {
    # TLS arms: same echo behavior over HTTPS. JDK TLS is pure JSSE (no
    # OpenSSL), so OBI sees these payloads ONLY via the java agent ioctl path.
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/downstream.crt;
    ssl_certificate_key /etc/nginx/certs/downstream.key;
    location / {
        default_type text/plain;
        return 200 "ok\n";
    }
}
