server {
    listen 80;
    keepalive_timeout 0;
    location / {
        default_type text/plain;
        return 200 "ok\n";
    }
}

server {
    # Diagnostic for the TLS capture-loss finding: server closes after every
    # response, forcing the client to a fresh SSLSocket per request. If the
    # capture loss is keep-alive-reuse-bound, client spans reappear here.
    listen 443 ssl;
    keepalive_timeout 0;
    ssl_certificate /etc/nginx/certs/downstream.crt;
    ssl_certificate_key /etc/nginx/certs/downstream.key;
    location / {
        default_type text/plain;
        return 200 "ok\n";
    }
}
